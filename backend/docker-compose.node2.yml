services:
  nakama:
    build: .
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        exec /nakama/nakama
        --name nakama2
        --database.address postgres:localdb@172.31.34.142:5432/nakama
        --logger.level INFO
        --session.token_expiry_sec 7200
        --runtime.path /nakama/data/modules
        --runtime.js_entrypoint main.js
        --match.input_queue_size 128
        --cluster.name tictactoe-cluster
        --cluster.port 7352
        --cluster.join 172.31.34.142:7352
    restart: always
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
      - "7352:7352"